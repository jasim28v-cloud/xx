<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Home Work | Premium Content</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top, #1a1a1a, #050505); 
            color: white; font-family: 'Cairo', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh;
        }
        .header { padding: 30px; text-align: center; }
        .header h1 { 
            font-size: 2.2rem; margin: 0; 
            background: linear-gradient(to right, #ff0055, #ffcc00);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-weight: 900;
        }
        .video-container {
            width: 90%; max-width: 500px; 
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 2px solid #333; background: #000;
            margin-bottom: 25px;
        }
        video { width: 100%; display: block; }
        .btn {
            width: 80%; max-width: 400px; padding: 15px;
            background: #ff0055; color: white; border: none;
            border-radius: 12px; font-weight: bold; font-size: 1.1rem;
            text-decoration: none; text-align: center;
            transition: 0.3s; box-shadow: 0 10px 20px rgba(255, 0, 85, 0.3);
        }
        .btn:hover { transform: scale(1.05); background: #ff2e73; }
    </style>
</head>
<body>

    <div class="header">
        <h1>STUDIO HOME WORK</h1>
        <p style="color: #00d4ff; font-size: 0.9rem;">شاهد الفيديو الحصري الآن</p>
    </div>

    <div class="video-container">
        <video id="myVideo" controls poster="https://via.placeholder.com/500x300/000/ff0055?text=Click+to+Play">
            <source src="https://rhbqrxzippvfybmekda.supabase.co/storage/v1/object/public/videos/GET1.mp4" type="video/mp4">
            متصفحك لا يدعم تشغيل الفيديو.
        </video>
    </div>

    <a href="https://omg10.com/4/10637838" target="_blank" class="btn">
        🎁 اضغط هنا للحصول على الهدية
    </a>

    <script>
        const v = document.getElementById('myVideo');
        v.onplay = function() {
            if (!this.dataset.done) {
                // فتح رابط الإعلان عند بدء التشغيل
                window.open("https://omg10.com/4/10637838", "_blank");
                this.dataset.done = "true";
            }
        };
    </script>

</body>
</html>
