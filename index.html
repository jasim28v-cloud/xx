<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Home Work | Premium Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            background: #050505; color: white; font-family: 'Cairo', sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center;
        }
        .header { padding: 25px; text-align: center; width: 100%; border-bottom: 2px solid #ff0055; }
        .header h1 { margin: 0; background: linear-gradient(45deg, #ff0055, #ffcc00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .container { width: 90%; max-width: 500px; margin-top: 20px; }

        /* حاوية الفيديو الموحدة */
        .video-box { 
            background: #111; border-radius: 20px; overflow: hidden; 
            margin-bottom: 40px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        video { width: 100%; display: block; background: #000; }

        .btn-area { padding: 20px; text-align: center; }
        .action-btn { 
            display: block; padding: 15px; border-radius: 12px; font-weight: bold; 
            text-decoration: none; transition: 0.3s; margin-top: 10px;
        }
        .main-btn { background: #ff0055; color: white; }
        .sub-btn { background: #00d4ff; color: #000; margin-top: 15px; font-size: 0.9rem; }
        
        .action-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
    </style>
</head>
<body>

    <header class="header">
        <h1>STUDIO HOME</h1>
        <p style="color:#aaa; font-size:0.8rem;">اختر العرض المناسب وابدأ الآن 🚀</p>
    </header>

    <div class="container">

        <div class="video-box">
            <video controls><source src="GET1" type="video/mp4"></video>
            <div class="btn-area">
                <a href="https://omg10.com/4/10637838" target="_blank" class="action-btn main-btn">تفعيل العرض الأول 🔥</a>
            </div>
        </div>

        <div class="video-box">
            <video controls><source src="GET2" type="video/mp4"></video>
            <div class="btn-area">
                <a href="https://omg10.com/4/10637838" target="_blank" class="action-btn main-btn">تفعيل العرض الثاني 🚀</a>
                <a href="https://omg10.com/4/10637838" target="_blank" class="action-btn sub-btn">رابط إضافي 💎</a>
            </div>
        </div>

        <div class="video-box">
            <video controls><source src="GET3" type="video/mp4"></video>
            <div class="btn-area">
                <a href="https://omg10.com/4/10637838" target="_blank" class="action-btn main-btn">تفعيل العرض الثالث 🎁</a>
            </div>
        </div>

    </div>

    <script>
        // نظام فتح الإعلانات الذكي عند أي تشغيل
        document.querySelectorAll('video').forEach(v => {
            v.onplay = function() {
                if (!this.dataset.done) {
                    window.open("https://omg10.com/4/10637838", "_blank");
                    this.dataset.done = "true";
                }
            };
        });
    </script>
</body>
</html>
